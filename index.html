<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Etsy Ads Tracker — PN3 & PN4</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg-body: #0f172a;
      --bg-card: #1e293b;
      --bg-header: #0f172a;
      --bg-input: #1e293b;
      --border: #334155;
      --border-focus: #3b82f6;
      --text-main: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --text-dim: #475569;
      --scrollbar: #334155;
      --hover-row: rgba(59, 130, 246, .06);
      --overlay-bg: rgba(0, 0, 0, .5);
    }

    [data-theme="light"] {
      --bg-body: #f1f5f9;
      --bg-card: #ffffff;
      --bg-header: #ffffff;
      --bg-input: #f8fafc;
      --border: #e2e8f0;
      --border-focus: #3b82f6;
      --text-main: #1e293b;
      --text-secondary: #475569;
      --text-muted: #64748b;
      --text-dim: #94a3b8;
      --scrollbar: #cbd5e1;
      --hover-row: rgba(59, 130, 246, .06);
      --overlay-bg: rgba(0, 0, 0, .3);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      background: var(--bg-body);
      color: var(--text-main);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      transition: background .3s, color .3s
    }

    ::-webkit-scrollbar {
      width: 5px;
      height: 5px
    }

    ::-webkit-scrollbar-thumb {
      background: var(--scrollbar);
      border-radius: 3px
    }

    input[type=number] {
      -moz-appearance: textfield
    }

    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none
    }

    .mi {
      padding: 5px 6px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text-main);
      border-radius: 5px;
      text-align: center;
      font-size: 12px;
      font-family: monospace;
      outline: none;
      width: 68px;
      transition: background .3s, color .3s, border-color .3s
    }

    .mi:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, .15)
    }

    .nb {
      padding: 7px 20px;
      border: 2px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border-radius: 8px;
      transition: all .2s
    }

    .nb.on {
      background: linear-gradient(135deg, #3b82f6, #7c3aed);
      border-color: transparent;
      color: #fff
    }

    .tb {
      padding: 6px 14px;
      border: none;
      background: transparent;
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all .15s
    }

    .tb.on {
      color: #60a5fa;
      border-bottom-color: #60a5fa
    }

    .tb:hover {
      color: var(--text-secondary)
    }

    .card {
      background: var(--bg-card);
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
      transition: background .3s, border-color .3s
    }

    .btn {
      padding: 5px 12px;
      border: none;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer
    }

    .rh:hover {
      background: var(--hover-row) !important
    }

    select {
      padding: 4px 6px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text-main);
      border-radius: 5px;
      font-size: 11px;
      outline: none;
      transition: background .3s, color .3s, border-color .3s
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%)
      }

      to {
        transform: translateX(0)
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      justify-content: flex-end;
      animation: fadeIn .2s ease
    }

    .overlay-bg {
      background: var(--overlay-bg);
      position: absolute;
      inset: 0
    }

    .drawer {
      position: relative;
      width: min(720px, 95vw);
      height: 100%;
      background: var(--bg-body);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      animation: slideIn .25s ease;
      transition: background .3s, border-color .3s
    }

    .chart-wrap {
      position: relative;
      width: 100%
    }

    .hidden {
      display: none !important
    }

    .add-nick-btn {
      width: 36px;
      height: 36px;
      border: 2px dashed var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      border-radius: 8px;
      transition: all .2s;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .add-nick-btn:hover {
      border-color: #3b82f6;
      color: #3b82f6;
      background: rgba(59, 130, 246, .08)
    }

    .theme-toggle {
      width: 36px;
      height: 36px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-muted);
      font-size: 16px;
      cursor: pointer;
      border-radius: 8px;
      transition: all .2s;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .theme-toggle:hover {
      border-color: #f59e0b;
      color: #f59e0b;
      background: rgba(245, 158, 11, .08)
    }

    .nick-modal {
      position: fixed;
      inset: 0;
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn .2s ease
    }

    .nick-modal-box {
      position: relative;
      z-index: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      width: min(360px, 90vw);
      box-shadow: 0 20px 60px rgba(0, 0, 0, .4);
      transition: background .3s, border-color .3s
    }
  </style>
</head>

<body>
  <div id="app"></div>

  <script>
    const SK = "etsy-tracker-web-v1";
    const todayS = () => new Date().toISOString().split("T")[0];
    const fd = d => { const p = d.split("-"); return p[2] + "/" + p[1] };
    const STATUSES = ["Listing", "Publish", "Sold", "Best Seller"];
    const SCLR = { Listing: "#64748b", Publish: "#3b82f6", Sold: "#22c55e", "Best Seller": "#f59e0b" };

    // ─── DATA ───────────────────────────────────────────────────────────────────
    function mkPN4() {
      const items = [
        ["C1", "Core", "Watercolor Canvas", "Pose: Tựa đầu – Trái", "E55iXDOe"],
        ["C2", "Core", "Watercolor Canvas", "Pose: Tựa đầu – Phải", "w76fpEmB"],
        ["S2.1", "Support", "Watercolor Canvas", "Pose: Tựa đầu – Phải", "UTTDEGdL"],
        ["C3", "Core", "Watercolor Canvas", "Pose: Ôm ngồi", "00N3JLzT"],
        ["C4", "Core", "Watercolor Canvas", "Pose: Ôm đứng", "IP4CdRp7"],
        ["C5", "Core", "Watercolor Canvas", "Pose: Thơm má – Trái", "XVrOWAe3"],
        ["C6", "Core", "Watercolor Canvas", "Pose: Thơm má – Phải", "sSfPLPpk"],
        ["C7", "Core", "Watercolor Canvas", "Pose: Mẹ bế cao", "M0WhlrlJ"],
        ["S7.1", "Support", "Watercolor Canvas", "Pose: Mẹ bế cao", "w5i2IKLm"],
        ["C8", "Core", "Watercolor Canvas", "Pose: Bế trên vai", "aVgc9P8P"],
        ["C9", "Core", "Watercolor Canvas", "Pose: Bế trong lòng", "TL0ncuDR"],
        ["C10", "Core", "Watercolor Canvas", "Hand-Drawn", "7kJBXZ85"],
        ["C11", "Core", "Watercolor Canvas", "Digital Drawing", "qL7XrsK8"],
        ["C12", "Core", "Watercolor Canvas", "Ngang – 3/4", "sLOGBdct"],
        ["C13", "Core", "Watercolor Canvas", "Ngang – Khung", "ChOhf0Mc"],
        ["C14", "Core", "Watercolor Canvas", "Ngang – Quote", "xu5XeU22"],
        ["S15", "Support", "Watercolor Canvas", "Ngang – Happy", "MTP8HAQ0"],
        ["C16", "Core", "Star Map", "Stars Aligned", "VyW2lt7C"],
        ["C17", "Core", "Star Map", "Under These Stars", "Z1KmMnCh"],
        ["C18", "Core", "Star Map", "Under This Sky", "6ESxRAS2"],
        ["C19", "Core", "Star Map", "Mix Map x Pic", "aRl0U9ix"],
        ["C20", "Core", "Star Map", "Heart Shape", "mZQKnPib"],
        ["C21", "Core", "Star Map", "Classic Round", "zlgAYBHt"],
        ["C21b", "Core", "Moon Phase", "Single Moon", "3lefBEPK"],
        ["C22", "Core", "Moon Phase", "Quote: Days", "WWMwjjyG"]
      ];
      return items.map(([code, type, product, style, sku]) => ({ id: code, code, type, product, style, sku, status: "Listing", link: "", thumb: "" }));
    }
    function mkPN3() {
      return ["C1", "C2", "C3", "S3.1", "C4"].map(code => ({ id: code + "_pn3", code, type: code.startsWith("S") ? "Support" : "Core", product: "", style: "", sku: "", status: "Listing", link: "", thumb: "" }));
    }
    function getSig(v, cl, o, r, s) {
      const ctr = v > 0 ? cl / v : 0, roas = s > 0 ? r / s : 0;
      if (!v && !cl) return { i: "⏳", t: "Chưa có data", c: "#475569" };
      if (v > 30 && !cl) return { i: "🔴", t: "0 click → Đổi thumbnail", c: "#ef4444" };
      if (v < 50 && ctr < .01) return { i: "🔴", t: "Views+CTR thấp → SEO", c: "#ef4444" };
      if (v > 100 && ctr < .015) return { i: "🟡", t: "CTR thấp → A/B thumb", c: "#eab308" };
      if (ctr > .02 && !o) return { i: "🟡", t: "CTR ok, 0 đơn → Fix page", c: "#eab308" };
      if (o && roas < 1) return { i: "🟠", t: "ROAS " + roas.toFixed(1) + " → Giảm bid", c: "#f97316" };
      if (o && roas < 2) return { i: "🟢", t: "ROAS " + roas.toFixed(1) + " → Ổn", c: "#22c55e" };
      if (o && roas >= 2) return { i: "💎", t: "ROAS " + roas.toFixed(1) + " → Scale!", c: "#a855f7" };
      if (cl && !o) return { i: "🟡", t: "Có click, chưa đơn", c: "#eab308" };
      return { i: "📊", t: "Thu thập data", c: "#475569" };
    }
    function loadData() { try { const d = localStorage.getItem(SK); return d ? JSON.parse(d) : null; } catch (e) { return null; } }
    function saveData(d) { try { localStorage.setItem(SK, JSON.stringify(d)); } catch (e) { } }

    // ─── STATE ──────────────────────────────────────────────────────────────────
    let state = {
      data: null, nick: "PN4", tab: "daily", selDate: todayS(),
      detailId: null, addOpen: false, nf: { code: "", type: "Core", product: "", style: "", sku: "", link: "" },
      showNickModal: false, newNickName: ""
    };
    // Undo history
    const undoHistory = [];
    const MAX_UNDO = 50;
    function pushUndo() {
      undoHistory.push(JSON.stringify(state.data));
      if (undoHistory.length > MAX_UNDO) undoHistory.shift();
    }
    function undo() {
      if (undoHistory.length === 0) return;
      const prev = undoHistory.pop();
      state.data = JSON.parse(prev);
      saveData(state.data);
      render();
    }
    document.addEventListener('keydown', function (e) {
      if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
        e.preventDefault();
        undo();
      }
    });
    const charts = {};

    function setState(patch) { Object.assign(state, patch); render(); }

    // ─── CHART HELPERS ──────────────────────────────────────────────────────────
    const chartDefaults = {
      color: "#94a3b8",
      grid: { color: "rgba(30,41,59,.8)" },
      tooltip: { backgroundColor: "#1e293b", borderColor: "#334155", borderWidth: 1, titleColor: "#94a3b8", bodyColor: "#e2e8f0", padding: 8 }
    };
    function mkChart(id, type, labels, datasets, opts = {}) {
      const el = document.getElementById(id);
      if (!el) return;
      if (charts[id]) { charts[id].destroy(); delete charts[id]; }
      charts[id] = new Chart(el, {
        type,
        data: { labels, datasets },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { labels: { color: "#64748b", font: { size: 10 } } }, tooltip: chartDefaults.tooltip, ...(opts.plugins || {}) },
          scales: { x: { ticks: { color: "#64748b", font: { size: 10 } }, grid: { color: "rgba(51,65,85,.4)" } }, y: { ticks: { color: "#64748b", font: { size: 10 } }, grid: { color: "rgba(51,65,85,.4)" }, ...(opts.y || {}) }, y1: opts.y1 ? { ...opts.y1, ticks: { color: "#64748b", font: { size: 10 } }, grid: { display: false } } : undefined },
          animation: { duration: 400 },
          ...opts.extra
        }
      });
    }

    // ─── RENDER ─────────────────────────────────────────────────────────────────
    function render() {
      const { data, nick, tab, selDate, detailId, addOpen, nf } = state;
      if (!data) { document.getElementById("app").innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#64748b">Đang tải...</div>'; return; }
      const listings = data[nick].listings;
      const daily = data[nick].daily;

      // KPIs
      let tv = 0, tc = 0, to = 0, tr = 0, ts = 0;
      listings.forEach(l => { const d = daily[selDate] && daily[selDate][l.id]; if (d) { tv += d.views || 0; tc += d.clicks || 0; to += d.orders || 0; tr += d.revenue || 0; ts += d.spend || 0; } });
      const dayTotal = { views: tv, clicks: tc, ctr: tv > 0 ? tc / tv * 100 : 0, orders: to, revenue: tr, spend: ts, roas: ts > 0 ? tr / ts : 0 };

      // Chart data
      const oChart = Object.keys(daily).sort().map(d => {
        let v = 0, c = 0, o = 0, r = 0, s = 0;
        listings.forEach(l => { const m = daily[d] && daily[d][l.id]; if (m) { v += m.views || 0; c += m.clicks || 0; o += m.orders || 0; r += m.revenue || 0; s += m.spend || 0; } });
        return { date: fd(d), views: v, clicks: c, ctr: v > 0 ? c / v * 100 : 0, orders: o, revenue: r, spend: s, roas: s > 0 ? r / s : 0 };
      });

      const kpis = [
        ["Views", dayTotal.views, "#60a5fa"],
        ["Clicks", dayTotal.clicks, "#a78bfa"],
        ["CTR", dayTotal.ctr.toFixed(2) + "%", dayTotal.ctr > 1.5 ? "#34d399" : "#eab308"],
        ["Orders", dayTotal.orders, "#f472b6"],
        ["Revenue", "$" + dayTotal.revenue.toFixed(2), "#34d399"],
        ["Spend", "$" + dayTotal.spend.toFixed(2), "#fb923c"],
        ["ROAS", dayTotal.roas.toFixed(2), dayTotal.roas >= 2 ? "#a855f7" : dayTotal.roas >= 1 ? "#34d399" : "#ef4444"]
      ];

      const TH = ["", "Code", "Type", "Product", "Title", "SKU", "Link", "Views", "Clicks", "CTR", "Orders", "Revenue $", "Spend $", "ROAS", "Signal"];

      // Detail listing
      const detailL = detailId ? listings.find(l => l.id === detailId) : null;
      let detailDates = [];
      let detailTot = { v: 0, c: 0, o: 0, r: 0, s: 0 };
      let detailChartData = [];
      if (detailL) {
        detailDates = Object.keys(daily).sort();
        detailChartData = [];
        for (let dd of detailDates) {
          const m = (daily[dd] && daily[dd][detailL.id]) || {};
          const v = m.views || 0, cl = m.clicks || 0, o = m.orders || 0, r = m.revenue || 0, s = m.spend || 0;
          if (v || cl || o || r || s) {
            detailTot.v += v; detailTot.c += cl; detailTot.o += o; detailTot.r += r; detailTot.s += s;
            detailChartData.push({ date: fd(dd), views: v, clicks: cl, ctr: v > 0 ? cl / v * 100 : 0, orders: o, revenue: r, spend: s, roas: s > 0 ? r / s : 0 });
          }
        }
      }
      const tCtr = detailTot.v > 0 ? detailTot.c / detailTot.v * 100 : 0;
      const tRoas = detailTot.s > 0 ? detailTot.r / detailTot.s : 0;

      document.getElementById("app").innerHTML = `
  ${detailL ? `
  <div class="overlay" id="overlay">
    <div class="overlay-bg" onclick="closeDetail()"></div>
    <div class="drawer">
      <div style="position:sticky;top:0;z-index:10;background:#0f172a;padding:16px 20px;border-bottom:1px solid #334155">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div style="display:flex;gap:10;align-items:center">
            ${detailL.thumb ? `<img src="${detailL.thumb}" style="width:48px;height:48px;border-radius:8px;object-fit:cover">` : `<div style="width:48px;height:48px;border-radius:8px;background:#1e293b;display:flex;align-items:center;justify-content:center;color:#475569;font-size:10px">No img</div>`}
            <div style="margin-left:10px">
              <div style="display:flex;gap:6px;align-items:center">
                <span style="font-family:monospace;font-weight:700;font-size:18px">${detailL.code}</span>
                <span style="padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700;background:${detailL.type === "Core" ? "rgba(59,130,246,.15)" : "rgba(52,211,153,.15)"};color:${detailL.type === "Core" ? "#60a5fa" : "#34d399"}">${detailL.type}</span>
              </div>
              <div style="color:#94a3b8;font-size:11px;margin-top:2px">${detailL.product} · ${detailL.style}</div>
            </div>
          </div>
          <button onclick="closeDetail()" style="background:#1e293b;border:1px solid #334155;color:#94a3b8;width:32px;height:32px;border-radius:6px;cursor:pointer;font-size:16px">✕</button>
        </div>
        <div style="display:flex;gap:5px;margin-top:12px;flex-wrap:wrap">
          ${[["Views", detailTot.v, "#60a5fa"], ["Clicks", detailTot.c, "#a78bfa"], ["CTR", tCtr.toFixed(2) + "%", "#34d399"], ["Orders", detailTot.o, "#f472b6"], ["Revenue", "$" + detailTot.r.toFixed(2), "#34d399"], ["Spend", "$" + detailTot.s.toFixed(2), "#fb923c"], ["ROAS", tRoas.toFixed(2), tRoas >= 2 ? "#a855f7" : "#22c55e"]].map(([l, v, c]) => `
          <div style="background:#1e293b;border:1px solid #334155;border-radius:7px;padding:6px 10px;flex:1;min-width:75px">
            <div style="font-size:8px;color:#64748b;text-transform:uppercase">${l}</div>
            <div style="font-family:monospace;font-size:15px;font-weight:700;color:${c}">${v}</div>
          </div>`).join("")}
        </div>
      </div>
      <div style="padding:16px 20px">
        ${detailChartData.length === 0 ? `<div style="text-align:center;padding:40px;color:#475569">Chưa có data cho listing này.</div>` : `
        <h4 style="font-size:12px;color:#94a3b8;margin-bottom:8px">Views & Clicks</h4>
        <div class="chart-wrap" style="height:180px"><canvas id="dc1"></canvas></div>
        <h4 style="font-size:12px;color:#94a3b8;margin:16px 0 8px">CTR & ROAS</h4>
        <div class="chart-wrap" style="height:160px"><canvas id="dc2"></canvas></div>
        <h4 style="font-size:12px;color:#94a3b8;margin:16px 0 8px">Revenue vs Spend</h4>
        <div class="chart-wrap" style="height:170px"><canvas id="dc3"></canvas></div>
        <h4 style="font-size:12px;color:#94a3b8;margin:16px 0 8px">Orders</h4>
        <div class="chart-wrap" style="height:130px"><canvas id="dc4"></canvas></div>
        `}
      </div>
    </div>
  </div>`: ""}

  ${state.showNickModal ? `
  <div class="nick-modal">
    <div class="overlay-bg" onclick="closeNickModal()"></div>
    <div class="nick-modal-box">
      <h3 style="font-size:15px;font-weight:700;margin-bottom:14px;color:var(--text-main)">➕ Thêm tài khoản mới</h3>
      <input id="new-nick-input" type="text" placeholder="Tên tài khoản (VD: PN5)" value="${state.newNickName}" oninput="state.newNickName=this.value" style="width:100%;padding:10px 14px;background:var(--bg-input);border:2px solid var(--border);color:var(--text-main);border-radius:8px;font-size:14px;outline:none;margin-bottom:14px;transition:background .3s,color .3s,border-color .3s">
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn" style="background:transparent;border:1px solid var(--border);color:var(--text-secondary);padding:8px 16px" onclick="closeNickModal()">Hủy</button>
        <button class="btn" style="background:linear-gradient(135deg,#3b82f6,#7c3aed);color:#fff;padding:8px 20px" onclick="addNick()">Thêm</button>
      </div>
    </div>
  </div>`: ""}

  <div style="background:var(--bg-header);border-bottom:1px solid var(--border);padding:12px 18px;transition:background .3s,border-color .3s">
    <div style="max-width:1400px;margin:0 auto">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
        <h1 style="font-size:18px;font-weight:700;color:#60a5fa">Etsy Ads Tracker</h1>
        <div style="display:flex;gap:6px;align-items:center">
          ${Object.keys(data).map(n => `<button class="nb ${nick === n ? "on" : ""}" onclick="setNick('${n}')">${n}</button>`).join("")}
          <button class="add-nick-btn" onclick="openNickModal()" title="Thêm tài khoản">+</button>
          <div style="width:1px;height:24px;background:var(--border);margin:0 4px"></div>
          <button class="theme-toggle" onclick="toggleTheme()" title="Chế độ sáng/tối">${document.documentElement.getAttribute('data-theme') === 'light' ? '🌙' : '☀️'}</button>

      const dd = Object.keys(daily).sort();
      let csv = "Date,Code,Type,Product,Views,Clicks,CTR,Orders,Revenue,Spend,ROAS\n";
      dd.forEach(d => listings.forEach(l => { const m = (daily[d] && daily[d][l.id]) || {}; const v = m.views || 0, cl = m.clicks || 0, o = m.orders || 0, r = m.revenue || 0, s = m.spend || 0; csv += [d, l.code, l.type, l.product, v, cl, v > 0 ? (cl / v * 100).toFixed(2) : 0, o, r, s, s > 0 ? (r / s).toFixed(2) : 0].join(",") + "\n"; }));
      const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([csv], { type: "text/csv" })); a.download = nick + "_ads.csv"; a.click();
    }

    // ─── INIT ────────────────────────────────────────────────────────────────────
    loadTheme();
    const d = loadData();
    if (d) { state.data = d; }
    else { const init = { PN4: { listings: mkPN4(), daily: {} }, PN3: { listings: mkPN3(), daily: {} } }; saveData(init); state.data = init; }
    render();
  </script>
</body>

</html>
