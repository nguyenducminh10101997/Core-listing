function getSig(v,cl,o,r,s){
const ctr=v>0?cl/v:0,roas=s>0?r/s:0;
if(!v&&!cl)return{i:"⏳",t:"Chưa có data",c:"#475569"};
if(v>30&&!cl)return{i:"🔴",t:"0 click → Đổi thumbnail",c:"#ef4444"};
if(v<50&&ctr<.01)return{i:"🔴",t:"Views+CTR thấp → SEO",c:"#ef4444"};
if(v>100&&ctr<.015)return{i:"🟡",t:"CTR thấp → A/B thumb",c:"#eab308"};
if(ctr>.02&&!o)return{i:"🟡",t:"CTR ok, 0 đơn → Fix page",c:"#eab308"};
if(o&&roas<1)return{i:"🟠",t:"ROAS "+roas.toFixed(1)+" → Giảm bid",c:"#f97316"};
if(o&&roas<2)return{i:"🟢",t:"ROAS "+roas.toFixed(1)+" → Ổn",c:"#22c55e"};
if(o&&roas>=2)return{i:"💎",t:"ROAS "+roas.toFixed(1)+" → Scale!",c:"#a855f7"};
if(cl&&!o)return{i:"🟡",t:"Có click, chưa đơn",c:"#eab308"};
return{i:"📊",t:"Thu thập data",c:"#475569"};
}

function loadData(){
try{const d=localStorage.getItem(SK);return d?JSON.parse(d):null;}catch(e){return null;}
}
function saveData(d){
try{localStorage.setItem(SK,JSON.stringify(d));}catch(e){}
}

setData(init);saveData(init);
}

nd[nick].daily[date][lid][field]=parseFloat(val)||0;
save(nd);
},[data,nick,save]);

const setLF=useCallback((lid,field,val)=>{
const nd=JSON.parse(JSON.stringify(data));
const i=nd[nick].listings.findIndex(l=>l.id===lid);
if(i>=0){nd[nick].listings[i][field]=val;save(nd);}
},[data,nick,save]);

const addL=useCallback(()=>{
if(!nf.code)return;
const nd=JSON.parse(JSON.stringify(data));
nd[nick].listings.push({...nf,id:nf.code+"_"+Date.now(),sku:"",status:"Listing",link:"",thumb:""});

},[data,nick,nf,save]);

const rmL=useCallback(id=>{
if(!confirm("Xóa listing này?"))return;

save(nd);
},[data,nick,save]);

let v=0,c=0,o=0,r=0,s=0;
